experiment: e1
data:
  root: data
  train_split: train
  val_split: val
model:
  # YOLOv8m-scale multipliers.  The detector remains the project's dual-stream E1 model.
  num_classes: 5
  width_multiple: 0.75
  depth_multiple: 0.67
  max_channels: 768
  reg_max: 16
train:
  # Batch 16 doubles the original effective batch (8), so the AdamW learning rate is
  # scaled linearly from 1e-3 to 2e-3.  Reduce both to 8 / 1e-3 if memory is insufficient.
  epochs: 80
  batch_size: 16
  num_workers: 8
  lr: 0.002
  weight_decay: 0.0005
  warmup_epochs: 3
  amp: true
  seed: 42
  log_interval: 20
  min_box_size: 2.0
  eval_ap: true
  early_stop_patience: 15
  early_stop_min_epochs: 30
  early_stop_min_delta: 0.0001
  # Keep the post-processing setting that produced the best E1 submission.
  conf_threshold: 0.001
  nms_iou_threshold: 0.8
  max_detections: 300
output:
  dir: outputs/e1_fixed_fusion_v8m
